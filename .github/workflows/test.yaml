name: Test arkvm Action

on: [push, pull_request]

jobs:
  test-runtimes:
    strategy:
      fail-fast: false
      matrix:
        runtime: [arkjsvm, arkvm]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libatomic1

      - name: Setup arkvm
        id: setup
        uses: ./
        with:
          cache: false

      - name: Smoke test ${{ matrix.runtime }}
        env:
          ARKVM_ROOT: ${{ steps.setup.outputs.arkvm-path }}
        run: |
          bash ./scripts/ci/smoke_test.sh "${{ matrix.runtime }}"
